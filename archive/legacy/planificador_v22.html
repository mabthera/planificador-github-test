                if (!sub) return;

                const dataStr = JSON.stringify(sub, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const nav = document.createElement('a');
                nav.href = url;
                nav.download = `${sub.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_planner.json`;
                nav.click();
            },

            importSubject: () => {
                document.getElementById('file-import').click();
            },

            handleFileSelect: (input) => {
                const file = input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);

                        if (!json.id || !json.units) {
                            alert('El archivo no parece ser una asignatura válida.');
                            return;
                        }

                        json.id = Utils.uuid();
                        AppState.data.subjects.push(json);
                        app.saveToStorage();
                        app.renderDashboard();
                        alert('Asignatura importada correctamente.');
                    } catch (err) {
                        alert('Error al leer archivo JSON.');
                    }
                };
                reader.readAsText(file);
                input.value = '';
            },

            /* --- COMBINED VIEW LOGIC --- */

            renderCombinedView: () => {
                // Initialize selected subjects if empty (select all by default)
                if (AppState.selectedSubjects.length === 0) {
                    AppState.selectedSubjects = AppState.data.subjects.map(s => s.id);
                }

                app.renderSubjectSelector();
                app.renderCombinedCalendar();
            },

            renderSubjectSelector: () => {
                const container = document.getElementById('subject-checkbox-list');
                container.innerHTML = '';

                AppState.data.subjects.forEach(sub => {
                    const isChecked = AppState.selectedSubjects.includes(sub.id);

                    const item = document.createElement('div');
                    item.className = 'subject-checkbox-item';
                    item.onclick = () => app.toggleSubjectSelection(sub.id);

                    item.innerHTML = `
                        <input type="checkbox" ${isChecked ? 'checked' : ''} 
                               onchange="app.toggleSubjectSelection('${sub.id}')" 
                               onclick="event.stopPropagation()">
                        <div class="subject-color-badge" style="background: ${sub.color}"></div>
                        <label>${sub.name}</label>
                    `;

                    container.appendChild(item);
                });
            },

            toggleSubjectSelection: (subjectId) => {
                const index = AppState.selectedSubjects.indexOf(subjectId);
                if (index > -1) {
                    AppState.selectedSubjects.splice(index, 1);
                } else {
                    AppState.selectedSubjects.push(subjectId);
                }
                app.renderSubjectSelector();
                app.renderCombinedCalendar();
            },

            selectAllSubjects: () => {
                AppState.selectedSubjects = AppState.data.subjects.map(s => s.id);
                app.renderSubjectSelector();
                app.renderCombinedCalendar();
            },

            deselectAllSubjects: () => {
                AppState.selectedSubjects = [];
                app.renderSubjectSelector();
                app.renderCombinedCalendar();
            },

            calculateCombinedCalendar: () => {
                const selectedSubs = AppState.data.subjects.filter(s =>
                    AppState.selectedSubjects.includes(s.id)
                );

                if (selectedSubs.length === 0) {
                    return { combinedMap: new Map(), warnings: [] };
                }

                // Calculate individual calendars
                const subjectCalendars = selectedSubs.map(sub => ({
                    subject: sub,
                    calendar: app.calculateCalendar(sub)
                }));

                // Merge all calendars into one map
                const combinedMap = new Map();
                const warnings = [];

                // Find date range
                let minDate = null;
                let maxDate = null;

                selectedSubs.forEach(sub => {
                    const startDate = Utils.parseDate(sub.startDate);
                    if (!minDate || startDate < minDate) minDate = startDate;

                    let endYear = startDate.getFullYear();
                    if (startDate.getMonth() >= 6) endYear++;
                    const endDate = new Date(endYear, 5, 30);
                    if (!maxDate || endDate > maxDate) maxDate = endDate;
                });

                // Iterate through all dates
                let currentDate = new Date(minDate);
                while (currentDate <= maxDate) {
                    const dateStr = Utils.formatDate(currentDate);
                    const dayOfWeek = currentDate.getDay();

                    // Skip weekends
                    if (dayOfWeek === 0 || dayOfWeek === 6) {
                        currentDate = Utils.addDays(currentDate, 1);
                        continue;
                    }

                    const daySessions = [];

                    // Check each subject for this date
                    subjectCalendars.forEach(({ subject, calendar }) => {
                        const dayData = calendar.scheduleMap.get(dateStr);
                        if (dayData && dayData.type === 'class') {
                            daySessions.push({
                                subject: subject,
                                allocations: dayData.allocations,
                                totalSessions: dayData.totalOrigin
                            });
                        } else if (dayData && dayData.type === 'holiday') {
                            // Mark as holiday if any subject has it
                            if (!combinedMap.has(dateStr) || combinedMap.get(dateStr).type !== 'class') {
                                combinedMap.set(dateStr, { type: 'holiday' });
                            }
                        }
                    });

                    if (daySessions.length > 0) {
                        combinedMap.set(dateStr, {
                            type: 'multi-class',
                            sessions: daySessions
                        });
                    }

                    currentDate = Utils.addDays(currentDate, 1);
                }

                // Check for warnings
                subjectCalendars.forEach(({ subject, calendar }) => {
                    if (!calendar.finished) {
                        warnings.push(`⚠️ ${subject.name}: No hay tiempo suficiente para completar todas las unidades`);
                    }
                });

                return { combinedMap, warnings };
            },

            renderCombinedCalendar: () => {
                const { combinedMap, warnings } = app.calculateCombinedCalendar();
                const grid = document.getElementById('combined-calendar-grid');
                grid.innerHTML = '';

                const alerts = document.getElementById('combined-calendar-alerts');
                if (warnings.length > 0) {
                    alerts.innerHTML = warnings.join('<br>');
                    alerts.classList.remove('hidden');
                } else {
                    alerts.classList.add('hidden');
                }

                if (AppState.selectedSubjects.length === 0) {
                    grid.innerHTML = '<p class="text-muted">Selecciona al menos una asignatura para ver el calendario.</p>';
                    return;
                }

                // Find earliest start date
                const selectedSubs = AppState.data.subjects.filter(s =>
                    AppState.selectedSubjects.includes(s.id)
                );

                let earliestDate = null;
                selectedSubs.forEach(sub => {
                    const startDate = Utils.parseDate(sub.startDate);
                    if (!earliestDate || startDate < earliestDate) {
                        earliestDate = startDate;
                    }
                });

                if (!earliestDate) return;

                let renderYear = earliestDate.getFullYear();
                if (earliestDate.getMonth() < 6) renderYear--;

                let renderDate = new Date(renderYear, 8, 1); // September

                for (let i = 0; i < 10; i++) {
                    const monthCard = document.createElement('div');
                    monthCard.className = 'month-card';
                    const monthName = renderDate.toLocaleString('es-ES', { month: 'long', year: 'numeric' });

                    let html = `<div class="month-header">${monthName.toUpperCase()}</div>`;
                    html += `<div class="days-grid">
                        <div class="day-header">L</div><div class="day-header">M</div><div class="day-header">X</div>
                        <div class="day-header">J</div><div class="day-header">V</div><div class="day-header">S</div>
                        <div class="day-header">D</div>`;

                    let dayOfWeek = renderDate.getDay();
                    if (dayOfWeek === 0) dayOfWeek = 7;
                    for (let k = 1; k < dayOfWeek; k++) html += `<div class="day-cell empty"></div>`;

                    const currentMonth = renderDate.getMonth();
                    let d = new Date(renderDate);

                    while (d.getMonth() === currentMonth) {
                        const dateStr = Utils.formatDate(d);
                        const item = combinedMap.get(dateStr);
                        let isWeekend = (d.getDay() === 0 || d.getDay() === 6);

                        let cellStyle = '';
                        let cellContent = '';
                        let className = 'day-cell';
                        if (isWeekend) className += ' weekend';

                        if (item) {
                            if (item.type === 'holiday') {
                                cellStyle = 'background: rgba(0,0,0,0.05); color: #666; border: 1px dashed #ccc;';
                                cellContent = `<span class="day-number">${d.getDate()}</span><div class="day-info">Festivo</div>`;
                            } else if (item.type === 'multi-class') {
                                className += ' multi-subject';
                                cellContent = `<span style="position:absolute; top:2px; right:2px; z-index:5; background:rgba(255,255,255,0.8); border-radius:4px; padding:0 3px; font-size:0.7rem; font-weight:bold; color:#333; pointer-events: none;">${d.getDate()}</span>`;

                                item.sessions.forEach(session => {
                                    const subColor = session.subject.color;
                                    const subName = session.subject.name;
                                    const totalSessions = session.totalSessions;
                                    const labels = session.allocations.map(a => a.item.displayName);

                                    // Horizontal Bars: Stacked vertically
                                    // Show labels (Unit Name) inside bar instead of Subject Name
                                    cellContent += `<div class="subject-session-bar" 
                                        style="background: ${subColor};" 
                                        title="${subName}: ${labels.join(', ')} (${totalSessions} ses)">
                                        <div class="flex justify-between w-full">
                                            <span class="truncate">${labels.join(', ')}</span> 
                                            <span class="text-xs opacity-75 ml-1">(${totalSessions})</span>
                                        </div>
                                    </div>`;
                                });
                            }
                        } else {
                            // Check for global holiday even if no sessions
                            const isGlobalHoliday = (AppState.data.globalHolidays || []).includes(dateStr);
                            if (isGlobalHoliday) {
                                cellStyle = 'background: rgba(0,0,0,0.05); color: #666; border: 1px dashed #ccc;';
                                cellContent = `<span class="day-number">${d.getDate()}</span><div class="day-info">Festivo</div>`;
                            } else {
                                cellContent = `<span class="day-number">${d.getDate()}</span>`;
                            }
                        }

                        html += `<div class="${className}" style="${cellStyle}">${cellContent}</div>`;
                        d.setDate(d.getDate() + 1);
                    }

                    html += `</div>`;
                    monthCard.innerHTML = html;
                    grid.appendChild(monthCard);

                    renderDate.setMonth(renderDate.getMonth() + 1);
                }
            },

            /* --- DRAG & DROP FOR UNITS --- */

            dragStart: (e, uid) => {
                e.dataTransfer.setData('text/plain', uid);
                setTimeout(() => e.target.classList.add('dragging'), 0);
            },

            dragOver: (e) => {
                e.preventDefault();
                const unitItem = e.target.closest('.unit-item');
                if (unitItem && !unitItem.classList.contains('dragging')) {
                    unitItem.classList.add('drag-over');
                }
            },

            dragLeave: (e) => {
                const unitItem = e.target.closest('.unit-item');
                if (unitItem) {
                    unitItem.classList.remove('drag-over');
                }
            },

            drop: (e, targetUid) => {
                e.preventDefault();
                const unitItem = e.target.closest('.unit-item');
                if (unitItem) unitItem.classList.remove('drag-over');

                const draggedUid = e.dataTransfer.getData('text/plain');
                if (draggedUid === targetUid) return;

                const sub = AppState.data.subjects.find(s => s.id === AppState.currentSubjectId);
                const draggedIdx = sub.units.findIndex(u => u.id === draggedUid);
                const targetIdx = sub.units.findIndex(u => u.id === targetUid);

                if (draggedIdx > -1 && targetIdx > -1) {
                    const [draggedUnit] = sub.units.splice(draggedIdx, 1);
                    sub.units.splice(targetIdx, 0, draggedUnit);
                    app.saveCurrentSubject();
                }
            },

            /* --- STATS PANEL --- */

            renderStats: (subject, scheduleMap) => {
                const statsContent = document.getElementById('stats-content');
                if (!statsContent) return;

                let totalSessions = 0;
                let scheduledSessions = 0;

                let tCap = { 1: 0, 2: 0, 3: 0 };
                let tProg = { 1: 0, 2: 0, 3: 0 };

                let eval1Date = subject.evaluations?.[1] ? Utils.parseDate(subject.evaluations[1]) : null;
                let eval2Date = subject.evaluations?.[2] ? Utils.parseDate(subject.evaluations[2]) : null;
                let eval3Date = subject.evaluations?.[3] ? Utils.parseDate(subject.evaluations[3]) : null;

                const getTerm = (d) => {
                    if (eval1Date && d <= eval1Date) return 1;
                    if (eval2Date && d <= eval2Date) return 2;
                    return 3;
                };

                // Sum required sessions
                if (subject.planningMode === 'activity') {
                    subject.units.forEach(u => {
                        (u.activities || []).forEach(a => {
                            totalSessions += (parseInt(a.sessions) || 0) + (parseInt(a.extra) || 0);
                        });
                    });
                } else {
                    subject.units.forEach(u => {
                        totalSessions += (parseInt(u.base) || 0) + (parseInt(u.extra) || 0);
                    });
                }

                // 2. Calculate Total Possible Capacity (Totales - Espacio en el calendario)
                let allowedCapacity = 0;
                let capDate = Utils.parseDate(subject.startDate);
                let limitDate;
                if (subject.endDate) {
                    limitDate = Utils.parseDate(subject.endDate);
                } else {
                    let endYear = capDate.getFullYear();
                    if (capDate.getMonth() >= 6) { endYear++; }
                    limitDate = new Date(endYear, 5, 30);
                }

                const globalHolidays = new Set(AppState.data.globalHolidays || []);
                while (capDate <= limitDate) {
                    const dateStr = Utils.formatDate(capDate);
                    if (!globalHolidays.has(dateStr)) {
                        const dayOfWeek = capDate.getDay();
                        const dailySessions = parseInt(subject.schedule[dayOfWeek]) || 0;
                        allowedCapacity += dailySessions;

                        if (dailySessions > 0) {
                            const term = getTerm(capDate);
                            tCap[term] += dailySessions;
                        }
                    }
                    capDate = Utils.addDays(capDate, 1);
                }

                // Analyze scheduleMap
                scheduleMap.forEach((data, dateStr) => {
                    if (data.type === 'class') {
                        let used = 0;
                        data.allocations.forEach(a => used += a.sessions);
                        scheduledSessions += used;

                        const d = Utils.parseDate(dateStr);
                        const term = getTerm(d);
                        tProg[term] += used;
                    }
                });

                const pendingSessions = allowedCapacity - totalSessions;

                const tPend = {
                    1: tCap[1] - tProg[1],
                    2: tCap[2] - tProg[2],
                    3: tCap[3] - tProg[3]
                };

                statsContent.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card" title="Capacidad total física del calendario escolar">
                            <span class="stat-value">${allowedCapacity}</span>
                            <div class="stat-label">Sesiones Totales</div>
                        </div>
                        <div class="stat-card" title="Sesiones que conforman el temario">
                            <span class="stat-value success">${totalSessions}</span>
                            <div class="stat-label">Programadas</div>
                        </div>
                        <div class="stat-card" title="Sesiones vacías que no han sido asignadas en el temario">
                            <span class="stat-value ${pendingSessions < 0 ? 'warning' : ''}">${pendingSessions}</span>
                            <div class="stat-label">Pendientes / Libres</div>
                        </div>
                    </div>
                    ${(eval1Date || eval2Date || eval3Date) ? `
                    <div class="stats-trimester mt-2">
                        <div class="trimester-bar" style="background: rgba(79, 70, 229, 0.8)">
                            <div style="font-size: 0.8rem; font-weight: bold; margin-bottom: 4px;">1ª Eval</div>
                            <div style="display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 4px 6px; border-radius: 4px; font-size: 0.65rem;">
                                <div style="text-align: center;" title="Total físico"><span>Tot</span><br><b style="font-size: 0.9rem">${tCap[1]}</b></div>
                                <div style="text-align: center;" title="Programadas (Asignadas)"><span>Prog</span><br><b style="font-size: 0.9rem">${tProg[1]}</b></div>
                                <div style="text-align: center; color: ${tPend[1] < 0 ? '#fca5a5' : 'inherit'};" title="Libres / Pendientes"><span>Pend</span><br><b style="font-size: 0.9rem">${tPend[1]}</b></div>
                            </div>
                        </div>
                        <div class="trimester-bar" style="background: rgba(16, 185, 129, 0.8)">
                            <div style="font-size: 0.8rem; font-weight: bold; margin-bottom: 4px;">2ª Eval</div>
                            <div style="display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 4px 6px; border-radius: 4px; font-size: 0.65rem;">
                                <div style="text-align: center;" title="Total físico"><span>Tot</span><br><b style="font-size: 0.9rem">${tCap[2]}</b></div>
                                <div style="text-align: center;" title="Programadas (Asignadas)"><span>Prog</span><br><b style="font-size: 0.9rem">${tProg[2]}</b></div>
                                <div style="text-align: center; color: ${tPend[2] < 0 ? '#fca5a5' : 'inherit'};" title="Libres / Pendientes"><span>Pend</span><br><b style="font-size: 0.9rem">${tPend[2]}</b></div>
                            </div>
                        </div>
                        <div class="trimester-bar" style="background: rgba(245, 158, 11, 0.8)">
                            <div style="font-size: 0.8rem; font-weight: bold; margin-bottom: 4px;">3ª Eval</div>
                            <div style="display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 4px 6px; border-radius: 4px; font-size: 0.65rem;">
                                <div style="text-align: center;" title="Total físico"><span>Tot</span><br><b style="font-size: 0.9rem">${tCap[3]}</b></div>
                                <div style="text-align: center;" title="Programadas (Asignadas)"><span>Prog</span><br><b style="font-size: 0.9rem">${tProg[3]}</b></div>
                                <div style="text-align: center; color: ${tPend[3] < 0 ? '#fbbf24' : 'inherit'};" title="Libres / Pendientes"><span>Pend</span><br><b style="font-size: 0.9rem">${tPend[3]}</b></div>
                            </div>
                        </div>
                    </div>
                    ` : ''}
                `;
            },

            /* --- DARK MODE --- */

            toggleDarkMode: () => {
                const isDark = document.body.classList.toggle('dark-mode');
                localStorage.setItem('planificador_dark_mode', isDark);
                document.getElementById('btn-dark-mode').innerText = isDark ? '☀️' : '🌙';
            }
        };

        app.init();

        // Keyboard shortcuts for Undo/Redo
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                e.preventDefault();
                app.undo();
            }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
                e.preventDefault();
                app.redo();
            }
        });

    </script>
</body>

</html>
